version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
      - vector_store:/app/vector_store
    environment:
      - SECRET_KEY=${SECRET_KEY:-CHANGE_THIS_IN_PRODUCTION}
      - DATABASE_URL=sqlite+aiosqlite:///./data/emotional_support.db
      - RISK_ESCALATION_THRESHOLD=0.65
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - API_BASE=http://backend:8000
    restart: unless-stopped

volumes:
  db_data:
  vector_store:
